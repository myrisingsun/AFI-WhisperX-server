<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhisperX Transcription</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px 16px;
    }

    .container { max-width: 860px; margin: 0 auto; }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: #f8fafc;
    }
    .subtitle { color: #64748b; font-size: 0.875rem; margin-bottom: 28px; }

    .card {
      background: #1e2130;
      border: 1px solid #2d3354;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }

    .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 0.8125rem; color: #94a3b8; }

    input[type="file"] {
      background: #0f1117;
      border: 1px solid #2d3354;
      border-radius: 8px;
      padding: 8px 12px;
      color: #e2e8f0;
      font-size: 0.875rem;
      cursor: pointer;
      flex: 1;
      min-width: 220px;
    }
    input[type="file"]:hover { border-color: #4f63d2; }

    select {
      background: #0f1117;
      border: 1px solid #2d3354;
      border-radius: 8px;
      padding: 8px 12px;
      color: #e2e8f0;
      font-size: 0.875rem;
      cursor: pointer;
      min-width: 130px;
    }
    select:focus { outline: none; border-color: #4f63d2; }

    button[type="submit"], .btn {
      background: #4f63d2;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 20px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    button[type="submit"]:hover, .btn:hover { background: #3d4fb5; }
    button[type="submit"]:disabled { background: #2d3354; color: #64748b; cursor: not-allowed; }

    .btn-sm {
      padding: 5px 12px;
      font-size: 0.8125rem;
      background: #1e2130;
      border: 1px solid #2d3354;
      border-radius: 6px;
      color: #94a3b8;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-sm:hover { border-color: #4f63d2; color: #e2e8f0; }

    /* Progress */
    #progress-area { display: none; }

    .progress-bar-wrap {
      background: #0f1117;
      border-radius: 6px;
      height: 6px;
      overflow: hidden;
      margin-top: 12px;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #4f63d2, #7c8ff5);
      width: 0%;
      transition: width 0.4s ease;
      border-radius: 6px;
    }
    .progress-bar.indeterminate {
      width: 40%;
      animation: slide 1.4s ease-in-out infinite;
    }
    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    .stage-label {
      font-size: 0.875rem;
      color: #94a3b8;
      margin-top: 8px;
    }
    .stage-label .dot {
      display: inline-block;
      animation: blink 1.2s step-start infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-pending   { background: #2d3354; color: #94a3b8; }
    .badge-processing { background: #1e3a5f; color: #60a5fa; }
    .badge-done      { background: #14432a; color: #4ade80; }
    .badge-error     { background: #3b1919; color: #f87171; }

    /* Results */
    #results-area { display: none; }

    .full-text {
      background: #0f1117;
      border-radius: 8px;
      padding: 16px;
      font-size: 0.9rem;
      line-height: 1.7;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
      color: #e2e8f0;
      margin-bottom: 20px;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
    thead th {
      text-align: left;
      padding: 8px 10px;
      color: #64748b;
      font-weight: 600;
      border-bottom: 1px solid #2d3354;
    }
    tbody tr:hover { background: #252840; }
    tbody td {
      padding: 7px 10px;
      border-bottom: 1px solid #1a1f35;
      color: #cbd5e1;
      vertical-align: top;
    }
    .time-cell { color: #64748b; white-space: nowrap; font-family: monospace; }
    .speaker-cell { color: #818cf8; font-weight: 600; white-space: nowrap; }

    .speaker-col { display: none; }
    {% if diarization %}
    .speaker-col { display: table-cell; }
    {% endif %}

    /* Past files */
    #files-area .file-list { display: flex; flex-direction: column; gap: 8px; }
    .file-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: #0f1117;
      border-radius: 8px;
      gap: 10px;
    }
    .file-name { font-size: 0.875rem; color: #e2e8f0; word-break: break-all; }
    .file-meta { font-size: 0.75rem; color: #64748b; white-space: nowrap; }

    .error-msg {
      background: #3b1919;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.875rem;
    }

    .queue-info {
      font-size: 0.8125rem;
      color: #64748b;
      margin-top: 6px;
    }

    .copy-btn {
      float: right;
      margin-top: -4px;
    }

    .tabs { display: flex; gap: 2px; margin-bottom: 16px; }
    .tab {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.8125rem;
      cursor: pointer;
      color: #64748b;
      border: 1px solid transparent;
      background: none;
    }
    .tab.active {
      background: #252840;
      color: #e2e8f0;
      border-color: #2d3354;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>
<div class="container">
  <h1>WhisperX Transcription</h1>
  <p class="subtitle">Async speech-to-text &mdash; загрузи файл, забери результат</p>

  <!-- Upload -->
  <div class="card">
    <h2>Загрузка</h2>
    <form id="upload-form">
      <div class="form-row">
        <div class="form-group" style="flex:1">
          <label for="audio-file">Аудиофайл</label>
          <input type="file" id="audio-file" accept="audio/*,video/*" required>
        </div>
        <div class="form-group">
          <label for="language">Язык</label>
          <select id="language">
            <option value="">Авто-определение</option>
            <option value="ru">Русский (ru)</option>
            <option value="en">English (en)</option>
            <option value="de">Deutsch (de)</option>
            <option value="fr">Français (fr)</option>
            <option value="es">Español (es)</option>
            <option value="zh">中文 (zh)</option>
            <option value="ja">日本語 (ja)</option>
            <option value="uk">Українська (uk)</option>
            <option value="pl">Polski (pl)</option>
          </select>
        </div>
        <div class="form-group">
          <label>&nbsp;</label>
          <button type="submit" id="submit-btn">Транскрибировать</button>
        </div>
      </div>
    </form>
  </div>

  <!-- Progress -->
  <div class="card" id="progress-area">
    <h2>
      Прогресс
      &nbsp;<span id="status-badge" class="status-badge badge-pending">pending</span>
    </h2>
    <div class="stage-label" id="stage-label">Ожидание<span class="dot">...</span></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar indeterminate" id="progress-bar"></div>
    </div>
    <div class="queue-info" id="queue-info"></div>
  </div>

  <!-- Error -->
  <div id="error-area" style="display:none; margin-bottom:20px;">
    <div class="error-msg" id="error-msg"></div>
  </div>

  <!-- Results -->
  <div class="card" id="results-area">
    <h2>Результат</h2>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('text')">Полный текст</button>
      <button class="tab" onclick="switchTab('segments')">Сегменты</button>
    </div>

    <div class="tab-panel active" id="tab-text">
      <button class="btn-sm copy-btn" onclick="copyText()">Копировать</button>
      <div class="full-text" id="full-text"></div>
      <div style="margin-top:10px; font-size:0.8125rem; color:#64748b;" id="meta-info"></div>
    </div>

    <div class="tab-panel" id="tab-segments">
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>Start</th>
              <th>End</th>
              <th class="speaker-col">Speaker</th>
              <th>Text</th>
            </tr>
          </thead>
          <tbody id="segments-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Past Files -->
  <div class="card" id="files-area">
    <h2>
      Прошлые транскрипции
      <button class="btn-sm" style="float:right;margin-top:-2px" onclick="loadFiles()">Обновить</button>
    </h2>
    <div class="file-list" id="file-list">
      <div style="color:#64748b; font-size:0.875rem;">Загрузка...</div>
    </div>
  </div>
</div>

<script>
  const DIARIZATION_ENABLED = {{ diarization | tojson }};

  // Show speaker column if diarization is on
  if (DIARIZATION_ENABLED) {
    document.querySelectorAll('.speaker-col').forEach(el => el.style.display = 'table-cell');
  }

  const STAGES = {
    queued:        { label: "В очереди", pct: 5 },
    "loading audio": { label: "Загрузка аудио", pct: 15 },
    transcribing:  { label: "Транскрибация", pct: 45 },
    aligning:      { label: "Выравнивание (alignment)", pct: 70 },
    diarizing:     { label: "Диаризация спикеров", pct: 85 },
    saving:        { label: "Сохранение", pct: 95 },
    done:          { label: "Готово", pct: 100 },
    error:         { label: "Ошибка", pct: 0 },
  };

  let pollingTimer = null;
  let currentTaskId = null;

  document.getElementById('upload-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fileInput = document.getElementById('audio-file');
    const lang = document.getElementById('language').value;

    if (!fileInput.files[0]) return;

    clearError();
    hideResults();
    showProgress();
    disableSubmit(true);

    const fd = new FormData();
    fd.append('data', fileInput.files[0]);
    if (lang) fd.append('language', lang);

    try {
      const resp = await fetch('/transcribe', { method: 'POST', body: fd });
      const data = await resp.json();

      if (!resp.ok) {
        showError(data.error || 'Ошибка сервера');
        hideProgress();
        disableSubmit(false);
        return;
      }

      currentTaskId = data.task_id;
      startPolling(currentTaskId);
    } catch (err) {
      showError('Не удалось подключиться к серверу: ' + err.message);
      hideProgress();
      disableSubmit(false);
    }
  });

  function startPolling(taskId) {
    if (pollingTimer) clearInterval(pollingTimer);
    pollingTimer = setInterval(() => pollTask(taskId), 2000);
    pollTask(taskId);
  }

  async function pollTask(taskId) {
    try {
      const resp = await fetch(`/tasks/${taskId}`);
      if (!resp.ok) return;
      const task = await resp.json();

      updateProgress(task);

      if (task.status === 'done') {
        stopPolling();
        hideProgress();
        renderResult(task.result);
        loadFiles();
        disableSubmit(false);
      } else if (task.status === 'error') {
        stopPolling();
        hideProgress();
        showError(task.error || 'Неизвестная ошибка');
        disableSubmit(false);
      }
    } catch (err) {
      // network hiccup, keep polling
    }
  }

  function stopPolling() {
    if (pollingTimer) { clearInterval(pollingTimer); pollingTimer = null; }
  }

  function updateProgress(task) {
    const stage = STAGES[task.progress] || { label: task.progress, pct: 10 };
    const bar = document.getElementById('progress-bar');
    const label = document.getElementById('stage-label');
    const badge = document.getElementById('status-badge');
    const queueInfo = document.getElementById('queue-info');

    label.innerHTML = stage.label + (task.status === 'processing' ? '<span class="dot">...</span>' : '');

    if (stage.pct > 0) {
      bar.classList.remove('indeterminate');
      bar.style.width = stage.pct + '%';
    } else {
      bar.classList.add('indeterminate');
      bar.style.width = '0%';
    }

    const badgeClass = {
      pending: 'badge-pending',
      processing: 'badge-processing',
      done: 'badge-done',
      error: 'badge-error',
    }[task.status] || 'badge-pending';

    badge.className = 'status-badge ' + badgeClass;
    badge.textContent = task.status;

    if (task.status === 'pending') {
      queueInfo.textContent = 'Ожидание в очереди...';
    } else {
      queueInfo.textContent = '';
    }
  }

  function renderResult(result) {
    document.getElementById('full-text').textContent = result.text || '(текст не получен)';

    const dur = result.duration ? result.duration.toFixed(1) + 's' : '?';
    document.getElementById('meta-info').textContent =
      `Язык: ${result.language} | Длительность: ${dur} | Сегментов: ${result.segments_count} | Устройство: ${result.device}` +
      (result.diarization ? ' | Диаризация: включена' : '');

    const tbody = document.getElementById('segments-body');
    tbody.innerHTML = '';
    (result.all_segments || []).forEach(seg => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="time-cell">${fmtTime(seg.start)}</td>
        <td class="time-cell">${fmtTime(seg.end)}</td>
        <td class="speaker-col speaker-cell">${seg.speaker || ''}</td>
        <td>${escHtml(seg.text)}</td>
      `;
      tbody.appendChild(tr);
    });

    document.getElementById('results-area').style.display = 'block';
    switchTab('text');
  }

  function fmtTime(s) {
    if (s == null) return '?';
    const m = Math.floor(s / 60);
    const sec = (s % 60).toFixed(2).padStart(5, '0');
    return `${String(m).padStart(2, '0')}:${sec}`;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['text', 'segments'][i] === name);
    });
    document.getElementById('tab-text').classList.toggle('active', name === 'text');
    document.getElementById('tab-segments').classList.toggle('active', name === 'segments');
  }

  function copyText() {
    const text = document.getElementById('full-text').textContent;
    navigator.clipboard.writeText(text).catch(() => {});
  }

  async function loadFiles() {
    try {
      const resp = await fetch('/files');
      const data = await resp.json();
      const list = document.getElementById('file-list');
      if (!data.files || data.files.length === 0) {
        list.innerHTML = '<div style="color:#64748b; font-size:0.875rem;">Файлов нет</div>';
        return;
      }
      list.innerHTML = data.files.map(f => `
        <div class="file-item">
          <div>
            <div class="file-name">${escHtml(f.filename)}</div>
            <div class="file-meta">${f.modified} &bull; ${fmtSize(f.size)}</div>
          </div>
          <a class="btn-sm" href="/files/${encodeURIComponent(f.filename)}">Скачать</a>
        </div>
      `).join('');
    } catch (e) {
      document.getElementById('file-list').innerHTML = '<div style="color:#64748b;font-size:0.875rem;">Ошибка загрузки</div>';
    }
  }

  function fmtSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1024 / 1024).toFixed(1) + ' MB';
  }

  function showProgress() { document.getElementById('progress-area').style.display = 'block'; }
  function hideProgress() { document.getElementById('progress-area').style.display = 'none'; }
  function hideResults()  { document.getElementById('results-area').style.display = 'none'; }
  function clearError()   { document.getElementById('error-area').style.display = 'none'; }
  function showError(msg) {
    const el = document.getElementById('error-area');
    document.getElementById('error-msg').textContent = msg;
    el.style.display = 'block';
  }
  function disableSubmit(state) {
    const btn = document.getElementById('submit-btn');
    btn.disabled = state;
    btn.textContent = state ? 'Обработка...' : 'Транскрибировать';
  }

  // Initial load
  loadFiles();
</script>
</body>
</html>
